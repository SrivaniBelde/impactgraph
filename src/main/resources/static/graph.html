<!DOCTYPE html>
<html>
<head>
    <title>ImpactGraph Visualization</title>

    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>

    <style>
        body{
            font-family: Arial;
            margin:20px;
        }

        #network{
            width:100%;
            height:700px;
            border:1px solid lightgray;
        }

        button{
            padding:10px 20px;
            margin-bottom:20px;
            cursor:pointer;
        }
    </style>
</head>

<body>

<h2>ImpactGraph Visualization</h2>

<button onclick="loadGraph()">Load Graph</button>

<div id="network"></div>

<script>

    async function loadGraph(){

        const response = await fetch("/graph");

        const graph = await response.json();

        let nodes = [];
        let edges = [];

        let addedNodes = new Set();

        for(let file in graph){

            if(!addedNodes.has(file)){
                nodes.push({
                    id:file,
                    label:file,
                    shape:"box"
                });
                addedNodes.add(file);
            }

            graph[file].forEach(dep=>{

                if(!addedNodes.has(dep)){
                    nodes.push({
                        id:dep,
                        label:dep
                    });

                    addedNodes.add(dep);
                }

                edges.push({
                    from:file,
                    to:dep,
                    arrows:"to"
                });

            });

        }

        const container=document.getElementById("network");

        const data={
            nodes:new vis.DataSet(nodes),
            edges:new vis.DataSet(edges)
        };

        const options={
            physics:{
                enabled:true
            },
            layout:{
                improvedLayout:true
            }
        };

        new vis.Network(container,data,options);

    }

</script>

</body>
</html>
